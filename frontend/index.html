<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Login Form -->
            <div class="form-box login active" id="login-form">
                <h2>Welcome Back</h2>
                <p class="subtitle">Login to continue testing predictions</p>
                <form id="form-login">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="primary-btn">Log In</button>
                    <p class="switch-text">Don't have an account? <span onclick="toggleForms()">Sign Up</span></p>
                </form>
            </div>

            <!-- Sign Up Form -->
            <div class="form-box signup" id="signup-form">
                <h2>Create Account</h2>
                <p class="subtitle">Join us to get started</p>
                <form id="form-signup">
                    <div class="input-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required placeholder="Create a password">
                    </div>
                    <div class="input-group">
                        <label for="signup-confirm-password">Confirm Password</label>
                        <input type="password" id="signup-confirm-password" required placeholder="Confirm your password">
                    </div>
                    <button type="submit" class="primary-btn">Sign Up</button>
                    <p class="switch-text">Already have an account? <span onclick="toggleForms()">Log In</span></p>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
