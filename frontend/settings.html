<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JID – Settings</title>
    <link rel="stylesheet" href="chat.css"> <!-- Load shared styles -->
    <link rel="stylesheet" href="settings.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- ══ OUTER FRAME ══ -->
    <div class="frame">

        <!-- ══ SIDEBAR ══ -->
        <aside class="sidebar">
            <div class="sidebar-logo">JID</div>

            <nav class="sidebar-nav">
                <a href="chat.html" class="nav-item" id="nav-chat">
                    <i class="fa-solid fa-message"></i>
                    <span>Chat</span>
                </a>
                <a href="settings.html" class="nav-item active" id="nav-settings">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <nav class="sidebar-footer">
                <button class="nav-item footer-item" id="nav-help">
                    <i class="fa-regular fa-circle-question"></i>
                    <span>Help</span>
                </button>
                <button class="nav-item footer-item" id="nav-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Log out</span>
                </button>
            </nav>
        </aside>

        <!-- ══ MAIN AREA ══ -->
        <main class="main-container">

            <!-- ── SETTINGS SECTION ── -->
            <section class="main-content" id="settings-section">
                <h1 class="settings-title">Account Setting</h1>

                <div class="profile-header">
                    <div class="profile-avatar-wrapper">
                        <img src="https://cdn-icons-png.flaticon.com/512/1998/1998664.png" alt="Profile" class="profile-img">
                    </div>
                    <div class="profile-info">
                        <h2 class="profile-name" id="display-name">Loading...</h2>
                        <p class="profile-email" id="display-email"></p>
                        <p class="profile-phone" id="display-phone"></p>
                        <div class="profile-actions">
                            <button class="btn btn-secondary">Upload Profile</button>
                            <button class="btn btn-outline">Delete</button>
                        </div>
                    </div>
                </div>

                <div class="settings-form">
                    <h3 class="form-section-title">Profile</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Firstname</label>
                            <div class="edit-input-wrapper">
                                <input type="text" id="input-firstname" placeholder="Firstname">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Lastname</label>
                            <div class="edit-input-wrapper">
                                <input type="text" id="input-lastname" placeholder="Lastname">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <div class="edit-input-wrapper">
                                <input type="email" id="input-email" placeholder="Email">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <div class="edit-input-wrapper">
                                <input type="text" id="input-phone" placeholder="Phone">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                    </div>

                    <h3 class="form-section-title">Password</h3>
                    <div class="form-grid stack">
                        <div class="form-group">
                            <label>Current Password</label>
                            <div class="edit-input-wrapper">
                                <input type="password" value="**********">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <div class="edit-input-wrapper">
                                <input type="password" placeholder="New Password">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="edit-input-wrapper">
                                <input type="password" placeholder="Confirm Password">
                                <i class="fa-solid fa-pen-to-square edit-icon"></i>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-full" id="btn-update-settings">Update</button>
                </div>
            </section>

        </main>

    </div>

    <script src="settings.js"></script>
</body>
</html>
